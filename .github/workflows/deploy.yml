
name: Deploy Next.js

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Setup Bun 
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies 
        run: bun install

      - name: Build Project 
        run: |
          bun run build
          touch out/.nojekyll

      - name: Deploy to GitHub Pages 
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages